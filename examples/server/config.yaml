# Example pdsd server config.
# Install to one of:
#   /usr/lib/pds/server/config.yaml         (vendor default)
#   /etc/pds/server/config.yaml             (system)
#   ~/.config/pds/server/config.yaml        (per-user, highest precedence)
# Drop-ins in the sibling config.d/ directory override the base file.
#
# Host keys are NOT configured here: pdsd uses ~/.ssh/id_* (override with -ssh-dir).

sshListen: ":2222"

# `sshListen` (and `httpListen` below) accept three forms:
#   ":2222"            — all interfaces on this port
#   "127.0.0.1:2222"   — a specific IP (IPv6 as "[::1]:2222")
#   "myhost:2222"      — a hostname, resolved and bound once at startup
#   "iface:eth0:2222"  — track a network interface's addresses (see below)
# The first three are bound once; if the bind fails, pdsd exits.
#
# The "iface:" form binds the current addresses of the named interface and keeps
# them in sync as addresses come and go (e.g. a VPN like tailscale0 coming up).
# Link-local addresses are skipped. If the interface has no usable address —
# missing, down, or not yet assigned at startup — pdsd waits up to 60 seconds for
# one to appear and then exits. The explicit "iface:" marker is required because an
# interface name can also be a valid hostname. Tracking interface addresses needs
# the systemd unit to allow AF_NETLINK (see packaging/systemd/pds@.service).

# Optional. When set, pdsd also serves the buckets read-only over plain HTTP on this
# address (its own port; SSH is unaffected; same address forms as `sshListen`). HTTP
# is unauthenticated, so it REQUIRES allowAnonymous: true below — otherwise pdsd
# exits at startup. Leave unset to disable.
# httpListen: ":8080"

# Optional. Exposed to clients as the .pds/exec alias and used by `pds exec`.
# MUST reference a mode:ro bucket, or pdsd exits at startup.
execBucket: scripts

# Allow unauthenticated clients (no SSH key) to connect read-only: they can read
# any bucket but cannot push, and have no .self host directory. Such clients must
# connect as SSH user "anonymous" (pds does this with `anonymous: true`). Default
# false. When true, authorizedKeys becomes optional.
allowAnonymous: false

# Map each authorized client public key to the host name it acts as. byHost
# buckets file that host's pushes automatically. Multiple keys per host allowed.
authorizedKeys:
  - host: web01
    keys:
      - ssh-ed25519 AAAAEXAMPLEreplace-with-web01-client-key web01
  - host: web02
    keys:
      - ssh-ed25519 AAAAEXAMPLEreplace-with-web02-client-key web02

buckets:
  # Read-only script distribution.
  scripts:
    path: /srv/pds/scripts
    mode: ro

  # Read-write, versioned, per-host metrics collection.
  metrics:
    path: /data/metrics
    mode: rw
    versioned: true     # keep every dated push + a latest.<ext> symlink
    byHost: true         # file under <path>/<host>/
    extension: yaml
    validator: yaml      # yaml | json | jsonl | none

  # Read-write, latest-only, shared (any authorized host may push).
  status:
    path: /data/status
    mode: rw
    versioned: false    # overwrite a single latest.<ext>
    byHost: false
    extension: json
    validator: json

  # Read-write, versioned, per-host JSON Lines logs (one JSON value per line).
  logs:
    path: /data/logs
    mode: rw
    versioned: true
    byHost: true
    extension: jsonl
    validator: jsonl
