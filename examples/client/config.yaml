# Example pds client config.
# Install to one of:
#   /usr/lib/pds/client/config.yaml         (vendor default)
#   /etc/pds/client/config.yaml             (system)
#   ~/.config/pds/client/config.yaml        (per-user, highest precedence)
# Drop-ins in the sibling config.d/ directory override the base file.

# Server address. host may be a name, IPv4, or IPv6 literal (e.g. ::1). The SSH
# endpoint is host:sshPort; PDS_ENDPOINT overrides it at runtime.
host: pds.example.com
sshPort: 2222

# Optional. Only used by `pds endpoint --http` to print the read-only HTTP URL
# (http://host:httpPort). Must match the server's httpListen port.
# httpPort: 8080

# Pinned server host keys. Any match is accepted, so list every node in a
# cluster (each with its own locally generated key) and keep old keys here
# during rotation.
trustedKeys:
  - ssh-ed25519 AAAAEXAMPLEreplace-with-node1-host-key node1
  - ssh-ed25519 AAAAEXAMPLEreplace-with-node2-host-key node2

# Optional; defaults to ~/.ssh/id_* if omitted.
# identities:
#   - ~/.ssh/id_ed25519

# If no key authenticates (none configured, or the server rejects it) and the server
# has allowAnonymous: true, pds automatically retries read-only as the "anonymous"
# user. A host-key mismatch or network failure never triggers this fallback.
